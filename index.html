<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raghav & Anusha — Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#4a2f21; --secondary:#b8926a; --dark:#2c2520;
    --light:#fdfaf4;   --gold-light:#f3ece0;
    --env-front:#ecdcc5; --env-back:#decbad; --env-flap:#d4bf9c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Montserrat',sans-serif;background:var(--light);
    color:var(--dark);text-align:center;min-height:100vh;
    display:flex;justify-content:center;align-items:center;
    padding:20px;overflow-x:hidden;
  }
  .wrapper{position:relative;width:100%;max-width:650px;display:flex;justify-content:center;align-items:center;}

  /* ============ ENVELOPE ============ */
  .envelope{
    position:relative;width:450px;height:300px;max-width:92vw;
    cursor:pointer;perspective:1500px;
    transition:transform .9s cubic-bezier(.4,0,.2,1),opacity .6s ease .3s;
    z-index:10;
  }
  .env-body{
    position:absolute;inset:0;background:var(--env-back);
    border-radius:6px;box-shadow:0 30px 60px rgba(74,47,33,.25);
    overflow:hidden;
  }
  /* Bottom + side flap (visible front pocket) */
  .env-front{
    position:absolute;left:0;right:0;bottom:0;height:65%;
    background:var(--env-front);
    clip-path:polygon(0 35%,50% 100%,100% 35%,100% 100%,0 100%);
    z-index:3;
  }
  /* Top flap */
  .env-flap{
    position:absolute;top:0;left:0;width:100%;height:100%;
    background:var(--env-flap);
    clip-path:polygon(0 0,100% 0,50% 65%);
    transform-origin:top center;
    transition:transform .6s ease;
    z-index:5;
  }
  .wax-seal{
    position:absolute;top:55%;left:50%;
    transform:translate(-50%,-50%);
    width:60px;height:60px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#e8c89a 0%,var(--secondary) 70%,#8e6a44 100%);
    box-shadow:0 4px 10px rgba(0,0,0,.25),inset 0 0 8px rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:'Alex Brush',cursive;font-size:1.6rem;
    z-index:6;transition:transform .3s ease;
  }
  .wax-seal::after{content:"R&A"}
  .envelope:hover .wax-seal{transform:translate(-50%,-50%) scale(1.08)}
  .env-text{
    position:absolute;left:0;right:0;bottom:18%;
    font-family:'Alex Brush',cursive;font-size:2.2rem;
    color:var(--primary);z-index:4;pointer-events:none;
  }

  /* Open state */
  .wrapper.is-open .env-flap{transform:rotateX(180deg);z-index:1}
  .wrapper.is-open .wax-seal{opacity:0;transition:opacity .3s ease}
  .wrapper.is-open .envelope{
    transform:translateY(110vh) rotate(-3deg);opacity:0;pointer-events:none;
  }

  /* ============ INVITATION CARD ============ */
  .main-card{
    position:absolute;width:100%;max-width:600px;
    background:#fff;padding:45px 25px;border-radius:4px;
    box-shadow:0 15px 40px rgba(74,47,33,.08);
    border:1px solid var(--gold-light);
    opacity:0;transform:translateY(50px) scale(.95);
    transition:opacity .8s cubic-bezier(.4,0,.2,1) .4s,transform .8s cubic-bezier(.4,0,.2,1) .4s;
    pointer-events:none;z-index:2;
  }
  .main-card::before{
    content:'';position:absolute;inset:15px;
    border:1px solid var(--secondary);opacity:.4;pointer-events:none;
  }
  .wrapper.is-open .main-card{
    opacity:1;transform:translateY(0) scale(1);pointer-events:auto;position:relative;
  }

  .hashtag{font-size:.8rem;letter-spacing:3px;text-transform:uppercase;color:var(--secondary);margin-bottom:12px;font-weight:500}
  .subtitle-top{font-family:'Alex Brush',cursive;font-size:1.9rem;color:var(--primary);margin-bottom:8px}
  .announcement{
    font-size:.75rem;letter-spacing:4px;text-transform:uppercase;color:var(--dark);
    background:var(--gold-light);padding:6px 20px;border-radius:2px;
    display:inline-block;margin-bottom:30px;font-weight:500;
  }
  .main-title{font-size:2.6rem;color:var(--primary);font-weight:300;letter-spacing:4px;line-height:1.2;margin-bottom:10px;text-transform:uppercase}
  .ampersand{font-family:'Alex Brush',cursive;font-size:2.6rem;color:var(--secondary);display:block;margin:5px 0;text-transform:lowercase}

  .save-the-date{font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--secondary);margin-top:25px;margin-bottom:15px}
  .date-container{
    display:flex;align-items:center;justify-content:center;gap:15px;
    border-top:1px solid var(--secondary);border-bottom:1px solid var(--secondary);
    padding:8px 25px;margin:0 auto 35px;max-width:300px;
  }
  .date-part{font-size:1rem;letter-spacing:2px;text-transform:uppercase}
  .date-main{font-size:1.8rem;font-weight:600;color:var(--primary)}
  .date-main sup{font-size:.7rem;font-weight:500;margin-left:2px;vertical-align:super}

  .countdown-container{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px}
  .time-box{background:#fff;padding:10px 6px;border-radius:4px;min-width:62px;border:1px solid var(--gold-light)}
  .time-box span{display:block;font-size:1.4rem;font-weight:500;color:var(--primary)}
  .time-box label{display:block;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--secondary);margin-top:2px}

  .venue-card{background:#fbf9f5;padding:30px 20px;border-radius:4px;border:1px solid var(--gold-light);margin:20px auto 0;max-width:480px}
  .venue-title{font-size:1.15rem;font-weight:500;color:var(--primary);margin-bottom:12px;letter-spacing:1px;text-transform:uppercase}
  .venue-text{line-height:1.7;font-size:.9rem;color:#554a42;margin-bottom:25px}
  .map-btn{
    display:inline-block;background:var(--primary);color:#fff;text-decoration:none;
    padding:10px 30px;font-size:.75rem;font-weight:500;letter-spacing:2px;
    text-transform:uppercase;transition:all .3s ease;border:1px solid var(--primary);
  }
  .map-btn:hover{background:transparent;color:var(--primary)}
  footer{margin-top:35px;font-family:'Alex Brush',cursive;font-size:1.6rem;color:var(--secondary)}

  @media (max-width:600px){
    .envelope{height:260px}
    .main-title{font-size:2rem;letter-spacing:3px}
    .ampersand{font-size:2.2rem}
    .env-text{font-size:1.7rem}
    .main-card{padding:35px 18px}
  }
</style>
</head>
<body>
  <div class="wrapper" id="revealWrapper">

    <!-- Envelope -->
    <div class="envelope" onclick="openInvitation()" aria-label="Open invitation">
      <div class="env-body">
        <div class="env-front"></div>
        <div class="env-text">Raghav &amp; Anusha</div>
      </div>
      <div class="env-flap"></div>
      <div class="wax-seal"></div>
    </div>

    <!-- Invitation Card -->
    <main class="main-card">
      <div class="hashtag">#RAGHAVwedsANUSHA</div>
      <div class="subtitle-top">The Best Day is on its way!</div>
      <div class="announcement">Engagement Fixed</div>

      <h1 class="main-title">
        Raghav
        <span class="ampersand">&amp;</span>
        Anusha
      </h1>

      <div class="save-the-date">Save The Date</div>
      <div class="date-container">
        <div class="date-part">July</div>
        <div class="date-main">06<sup>th</sup></div>
        <div class="date-part">2026</div>
      </div>

      <div class="countdown-container">
        <div class="time-box"><span id="days">00</span><label>Days</label></div>
        <div class="time-box"><span id="hours">00</span><label>Hours</label></div>
        <div class="time-box"><span id="minutes">00</span><label>Mins</label></div>
        <div class="time-box"><span id="seconds">00</span><label>Secs</label></div>
      </div>

      <div class="venue-card">
        <div class="venue-title">Club Vasantha</div>
        <p class="venue-text">
          Sy No. 79, Vasantha City,<br>
          Bikshapathi Nagar, Hafeezpet,<br>
          Hyderabad, Telangana 500049
        </p>
        <a href="https://www.google.com/maps/search/?api=1&query=Club+Vasantha+Vasantha+City+Hafeezpet+Hyderabad"
           target="_blank" rel="noopener" class="map-btn">Locate On Map</a>
      </div>

      <footer>Two Hearts. One Beautiful Journey.</footer>
    </main>
  </div>

<script>
  function openInvitation(){
    document.getElementById('revealWrapper').classList.add('is-open');
  }

  const targetDate = new Date("July 6, 2026 00:00:00").getTime();
  const $ = id => document.getElementById(id);
  const pad = n => n < 10 ? "0" + n : n;

  const countdown = setInterval(() => {
    const diff = targetDate - Date.now();
    if (diff < 0){
      clearInterval(countdown);
      document.querySelector(".countdown-container").innerHTML =
        "<p style='font-weight:500;color:var(--primary);letter-spacing:2px;text-transform:uppercase;font-size:.85rem;'>The Celebration Has Begun!</p>";
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);   // ← fixed
    $("days").innerText = pad(d);
    $("hours").innerText = pad(h);
    $("minutes").innerText = pad(m);
    $("seconds").innerText = pad(s);
  }, 1000);
</script>
</body>
</html>
